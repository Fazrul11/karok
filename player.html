<!DOCTYPE html>
<html>
<head>
  <title>KTV PLAYER</title>
</head>
<body style="margin:0;background:black;">

<iframe id="player"
width="100%" height="100%"
frameborder="0"
allow="autoplay"></iframe>

<script>
setInterval(() => {
  let song = localStorage.getItem("song");

  if (song) {
    document.getElementById("player").src =
      `https://www.youtube.com/embed/${song}?autoplay=1`;
  }
}, 1000);
</script>

</body>
</html>
